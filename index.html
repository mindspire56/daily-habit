  .add-area input { flex:1; border:2px solid #e8ddd0; border-radius:14px; padding:12px 16px; font-size:15px; outline:none; background:#fff; color:#3d2c2c; transition:border-color .2s; }

{k:['\u6563\u6B65','walk','\u8D70\u8D70'],e:'\U0001F6B6'},
{k:['\u641C\u72D7','\u72D7','dog'],e:'\U0001F415'},
{k:['\u6574\u7406','\u6536\u7EB3','clean'],e:'\U0001F9F9'},
{k:['\u8BB0\u8D26','budget'],e:'\U0001F9FE'},
{k:['\u8DF3\u821E','\u821E\u8E48','dance'],e:'\U0001F483'},
];

function gs(n){var N=n.toLowerCase();for(var i=0;i<HABIT_STYLES.length;i++){for(var j=0;j<HABIT_STYLES[i].k.length;j++){if(N.indexOf(HABIT_STYLES[i].k[j].toLowerCase())!==-1)return HABIT_STYLES[i].e}}return'\u2B50'}

function ch(history){var s=0;var d=new Date();while(true){var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(history[k]){s++;d.setDate(d.getDate()-1)}else break}return s}
function bh(history){if(!history||Object.keys(history).length===0)return 0;var days=Object.keys(history).sort();var b=0,c=1;for(var i=1;i<days.length;i++){var df=(new Date(days[i])-new Date(days[i-1]))/(1000*60*60*24);if(df===1){c++}else{b=Math.max(b,c);c=1}}return Math.max(b,c)}
function mcd(history){if(!history)return 0;var p=mk();return Object.keys(history).filter(function(k){return k.startsWith(p)}).length}
function tcc(history){return history?Object.keys(history).length:0}
function acd(){var m={};for(var i=0;i<st.habits.length;i++){var h=st.habits[i];if(!h.history)continue;var ks=Object.keys(h.history);for(var j=0;j<ks.length;j++){m[ks[j]]=(m[ks[j]]||0)+1}}return m}

var prevPct=-1,calOpen=false,calY,calM;

function render(){
var n=new Date();
var h=n.getHours();var g='';
if(h<6)g='\U0001F319 \u591C\u6DF1\u4E86\uFF0C\u65E9\u70B9\u4F11\u606F\uFF5E';
else if(h<9)g='\U0001F305 \u65E9\u4E0A\u597D\uFF0C\u53C8\u662F\u65B0\u7684\u4E00\u5929\uFF01';
else if(h<12)g='\u2600\uFE0F \u4E0A\u5348\u597D\uFF0C\u4ECA\u5929\u72B6\u6001\u600E\u4E48\u6837\uFF1F';
else if(h<14)g='\U0001F324\uFE0F \u4E2D\u5348\u597D\uFF0C\u8BB0\u5F97\u5403\u5348\u996D\uFF5E';
else if(h<18)g='\U0001F324\uFE0F \u4E0B\u5348\u597D\uFF0C\u7EE7\u7EED\u52A0\u6CB9\uFF01';
else if(h<21)g='\U0001F307 \u508D\u665A\u597D\uFF0C\u4ECA\u5929\u8FC7\u5F97\u5982\u4F55\uFF1F';
else g='\U0001F319 \u665A\u4E0A\u597D\uFF0C\u4ECA\u5929\u7684\u6253\u5361\u522B\u6F0F\u4E86\uFF5E';
document.getElementById('greetingDisplay').textContent=g;
document.getElementById('dateDisplay').textContent=n.getFullYear()+'\u5E74'+(n.getMonth()+1)+'\u6708'+n.getDate()+'\u65E5  \u661F\u671F'+WEEKDAYS[n.getDay()];
document.getElementById('quoteDisplay').textContent=QS[Math.floor(Math.random()*QS.length)];
var ts=tk();var dc=0;var habits=st.habits;
for(var i=0;i<habits.length;i++){if(habits[i].history&&habits[i].history[ts])dc++}
var total=habits.length;
document.getElementById('doneCount').textContent=dc;
document.getElementById('totalCount').textContent=total;
var pct=total>0?Math.round(dc/total*100):0;
document.getElementById('progressFill').style.width=pct+'%';
if(total>0&&pct===100&&prevPct!==100)confetti();
prevPct=pct;
var tmd=0,bsa=0,tca=0;
for(var i=0;i<habits.length;i++){var hh=habits[i];tmd=Math.max(tmd,mcd(hh.history));bsa=Math.max(bsa,bh(hh.history));tca+=tcc(hh.history)}
document.getElementById('monthDays').textContent=tmd;
document.getElementById('bestStreak').textContent=bsa;
document.getElementById('totalChecked').textContent=tca;
var el=document.getElementById('habitList');
if(total===0){el.innerHTML='<div class="empty-state"><div class="icon">\u2728</div><p>\u8FD8\u6CA1\u6709\u4E60\u60EF\uFF0C\u6DFB\u52A0\u4E00\u4E2A\u5F00\u59CB\u6253\u5361\u5427</p></div>';return}
var htm='';
for(var i=0;i<habits.length;i++){var h=habits[i];var d=!!(h.history&&h.history[ts]);var s=ch(h.history||{});var b=bh(h.history||{});htm+='<div class="habit-card'+(d?' done':'')+'" data-id="'+h.id+'"><div class="habit-emoji">'+(h.emoji||'\u2B50')+'</div><div class="habit-info"><div class="name">'+esc(h.name)+'</div><div class="streak">'+(s>0?'\U0001F525 \u8FDE\u7EED <span class="highlight">'+s+'</span> \u5929':'\u2615 \u4ECA\u5929\u5F00\u59CB\u79EF\u7D2F')+(b>1?' \u00B7 \u6700\u9AD8 <span class="best">'+b+'</span> \u5929':'')+'</div></div><button class="check-btn'+(d?' done':'')+'" data-action="toggle"><span class="check-icon">'+(d?'\u2713':'')+'</span></button><button class="delete-btn" data-action="delete" title="\u5220\u9664">\u2715</button></div>'}
el.innerHTML=htm;
if(calOpen)rc()
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function confetti(){var cs=['#e8835a','#f0a070','#f8d080','#a8d4b8','#d4b8d8','#f0b8b8','#8ec0e0'];var c=document.createElement('div');c.className='confetti-container';for(var i=0;i<40;i++){var p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=cs[Math.floor(Math.random()*cs.length)];p.style.width=(4+Math.random()*6)+'px';p.style.height=(4+Math.random()*6)+'px';p.style.borderRadius=Math.random()>0.5?'50%':'2px';p.style.animationDuration=(1.5+Math.random()*2)+'s';p.style.animationDelay=Math.random()*0.8+'s';c.appendChild(p)}document.body.appendChild(c);setTimeout(function(){c.remove()},4000)}

function rc(){var y=calY,m=calM;document.getElementById('calMonthLabel').textContent=y+'\u5E74'+(m+1)+'\u6708';var cm=acd();var nh=st.habits.length;var fd=new Date(y,m,1).getDay();var dim=new Date(y,m+1,0).getDate();var ts=tk();var mc=0;for(var d=1;d<=dim;d++){var k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');if(cm[k])mc++}document.getElementById('calSummary').innerHTML='\u672C\u6708\u6253\u5361 <span class="hl">'+mc+'</span> \u5929';var h='';for(var i=0;i<fd;i++)h+='<div class="cal-day other"></div>';for(var d=1;d<=dim;d++){var k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var ct=cm[k]||0;var it=k===ts;var cl='cal-day'+(it?' today':'');if(ct===0){h+='<div class="'+cl+'"><span class="num">'+d+'</span></div>'}else{var tp=ct>=nh?'full':'partial';h+='<div class="'+cl+'"><span class="num">'+d+'</span><span class="dot '+tp+'"></span></div>'}}document.getElementById('calGrid').innerHTML=h}

function tc(){calOpen=!calOpen;var p=document.getElementById('calPanel');p.classList.toggle('open',calOpen);if(calOpen){var n=new Date();calY=n.getFullYear();calM=n.getMonth();rc()}}

function toggle(id){var h=st.habits.find(function(x){return x.id===id});if(!h)return;var d=tk();if(!h.history)h.history={};if(h.history[d])delete h.history[d];else h.history[d]=true;sv();render()}

function del(id){st.habits=st.habits.filter(function(x){return x.id!==id});sv();render();toast('\u5DF2\u5220\u9664')}

function add(nm){nm=nm.trim();if(!nm)return;if(st.habits.some(function(h){return h.name===nm})){toast('\u8FD9\u4E2A\u4E60\u60EF\u5DF2\u7ECF\u6709\u4E86');return}var mx=st.habits.reduce(function(m,h){return Math.max(m,h.id)},0);st.habits.push({id:mx+1,name:nm,emoji:gs(nm),history:{}});sv();render();document.getElementById('habitInput').value='';toast('\u5DF2\u6DFB\u52A0')}

function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._timer);el._timer=setTimeout(function(){el.classList.remove('show')},1800)}

function sbd(){var cs=['#e8835a','#d4b8d8','#f8d080','#a8d4b8','#f0b8b8','#8ec0e0'];for(var i=0;i<15;i++){var d=document.createElement('div');d.className='bg-dot';var sz=4+Math.random()*10;d.style.width=sz+'px';d.style.height=sz+'px';d.style.background=cs[Math.floor(Math.random()*cs.length)];d.style.left=Math.random()*95+'%';d.style.top=Math.random()*95+'%';d.style.animation='floatA '+(6+Math.random()*8)+'s ease-in-out infinite';d.style.animationDelay=Math.random()*5+'s';document.body.appendChild(d)}var ss=['\u2726','\u2727','\u00B7','\u02D9'];for(var i=0;i<8;i++){var e=document.createElement('div');e.className='bg-star';e.textContent=ss[i%ss.length];e.style.left=Math.random()*93+'%';e.style.top=Math.random()*93+'%';e.style.fontSize=(12+Math.random()*14)+'px';e.style.color=cs[i%cs.length];e.style.animation='floatB '+(7+Math.random()*6)+'s ease-in-out infinite';e.style.animationDelay=Math.random()*4+'s';document.body.appendChild(e)}}

/* Music player */
var pl=['background.mp3','rain.mp3'];
var ct=0,mp=false,sk=false;
var ae=document.getElementById('bgAudio');
ae.volume=0.3;
var mpop=document.getElementById('mpOpen');
var mpb=document.getElementById('mp');
var mpp=document.getElementById('mpPlay');
var mppr=document.getElementById('mpProgress');
var mpt=document.getElementById('mpTime');
var mpl=document.getElementById('mpLabel');

function pt(idx){
if(idx<0)idx=pl.length-1;
if(idx>=pl.length)idx=0;
if(idx===ct&&mp)return;
ct=idx;mpl.textContent=(ct+1)+'/'+pl.length;
ae.src=pl[ct];ae.load();if(mp)ae.play()
}

function up(){
mpt.textContent='0:00 / 0:00';mppr.value=0;mppr.max=100
}

ae.addEventListener('loadedmetadata',function(){
var d=ae.duration;if(isNaN(d)||!isFinite(d))return;
mppr.max=Math.floor(d*10);
mpt.textContent='0:00 / '+Math.floor(d/60)+':'+String(Math.floor(d%60)).padStart(2,'0')
});

ae.addEventListener('timeupdate',function(){
var d=ae.duration;if(isNaN(d)||!isFinite(d))return;
var ct2=ae.currentTime;
mppr.value=Math.floor(ct2*10);
mpt.textContent=Math.floor(ct2/60)+':'+String(Math.floor(ct2%60)).padStart(2,'0')+' / '+Math.floor(d/60)+':'+String(Math.floor(d%60)).padStart(2,'0')
});

mppr.addEventListener('input',function(){
var d=ae.duration;if(isNaN(d)||!isFinite(d))return;
ae.currentTime=mppr.value/10
});

function togglePlay(){
if(mp){ae.pause();mp=false;sk=false;mpp.textContent='\u25B6';mpop.classList.remove('playing')}
else{ae.play().then(function(){mp=true;sk=false;mpp.textContent='\u23F8';mpop.classList.add('playing');pt(ct)}).catch(function(){toast('\u70B9\u51FB\u7FFB\u8F6C\u7136\u540E\u518D\u70B9\u64AD\u653E')}}
}

mpop.addEventListener('click',function(){if(!mp&&!sk){sk=true;mpb.classList.add('show');pt(0);ae.play().then(function(){mp=true;mpp.textContent='\u23F8';mpop.classList.add('playing')}).catch(function(){})}else{togglePlay()}});

document.getElementById('mpPrev').addEventListener('click',function(e){e.stopPropagation();pt(ct-1);if(!mp){ae.play().then(function(){mp=true;mpp.textContent='\u23F8';mpop.classList.add('playing')}).catch(function(){})}});
document.getElementById('mpNext').addEventListener('click',function(e){e.stopPropagation();pt(ct+1);if(!mp){ae.play().then(function(){mp=true;mpp.textContent='\u23F8';mpop.classList.add('playing')}).catch(function(){})}});

document.getElementById('calToggleBtn').addEventListener('click',tc);

document.getElementById('habitList').addEventListener('click',function(e){var db=e.target.closest('[data-action="delete"]');if(db){var c=db.closest('.habit-card');if(c)del(Number(c.dataset.id));return}var c=e.target.closest('.habit-card');if(c)toggle(Number(c.dataset.id))});

up();sbd();render();
})();
