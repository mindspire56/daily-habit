<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>&#x6BCF;&#x65E5;&#x6253;&#x5361;</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(145deg,#fdf6ee,#f5ebe0);min-height:100vh;color:#3d2c2c;line-height:1.5;overflow-x:hidden;position:relative}
.container{max-width:520px;margin:0 auto;padding:32px 20px 100px;position:relative;z-index:1}

.header{text-align:center;margin-bottom:28px}
.header .greeting{font-size:14px;color:#b29595;margin-bottom:2px}
.header h1{font-size:26px;font-weight:700;letter-spacing:.5px;color:#4a3636}
.header .date{font-size:14px;color:#9a7a7a;margin-top:2px}
.summary{margin-top:16px;display:flex;justify-content:center;gap:32px}
.summary-item{display:flex;flex-direction:column;align-items:center}
.summary-item .num{font-size:26px;font-weight:700;color:#e8835a}
.summary-item .label{font-size:12px;color:#b29595;margin-top:1px}

.progress-wrap{background:#fff;border-radius:14px;padding:6px 0;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.bar-track{width:100%;height:8px;background:#f0e8e0;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#e8835a,#f0a070);border-radius:6px;transition:width .5s ease;width:0%}

.cal-toggle{display:inline-flex;align-items:center;gap:5px;background:#fff;border:none;border-radius:10px;padding:6px 14px;font-size:13px;color:#9a7a7a;cursor:pointer;transition:all .2s;margin-top:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.cal-toggle:hover{color:#e8835a}
.cal-toggle svg{width:16px;height:16px}

.cal-panel{background:#fff;border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);display:none}
.cal-panel.open{display:block}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-nav button{background:none;border:none;cursor:pointer;padding:4px;color:#b29595;font-size:18px;line-height:1;transition:color .2s;display:flex}
.cal-nav button:hover{color:#e8835a}
.cal-nav .cal-month-label{font-size:16px;font-weight:600;color:#4a3636;min-width:100px;text-align:center}
.cal-nav button svg{width:20px;height:20px}
.cal-summary{font-size:13px;color:#b29595}
.cal-summary .hl{color:#e8835a;font-weight:600}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;text-align:center}
.cal-weekdays span{font-size:12px;color:#b29595;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{text-align:center;padding:6px 0;font-size:14px;color:#3d2c2c;border-radius:8px;position:relative;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cal-day.other{color:#ddd}
.cal-day.today{font-weight:700}
.cal-day .dot{display:block;width:6px;height:6px;border-radius:50%;margin-top:2px}
.cal-day .dot.on{background:#e8835a}

.habit-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.habit-card{background:#fff;border-radius:18px;padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,.04);display:flex;align-items:center;gap:14px;cursor:pointer;transition:opacity .3s,transform .15s}
.habit-card:active{transform:scale(.98)}
.habit-card.done{opacity:.55}
.habit-emoji{font-size:34px;line-height:1;width:46px;text-align:center;flex-shrink:0}
.habit-info{flex:1;min-width:0}
.habit-info .name{font-size:17px;font-weight:600;color:#3d2c2c}
.habit-card.done .habit-info .name{color:#b29595;text-decoration:line-through}
.habit-info .streak{font-size:13px;color:#b29595;margin-top:2px}
.habit-info .streak .hl{font-weight:700;color:#e8835a}
.check-btn{width:48px;height:48px;border-radius:50%;border:2.5px solid #e8ddd0;background:#fcf9f6;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:22px;color:transparent;padding:0;position:relative;z-index:2}
.check-btn:active{transform:scale(.88)}
.check-btn.done{border-color:#e8835a;background:#e8835a;color:#fff;box-shadow:0 3px 12px rgba(232,131,90,.3)}

.quote-box{background:#fff;border-radius:14px;padding:16px 22px;margin:18px 0;box-shadow:0 2px 10px rgba(0,0,0,.04);text-align:center;border-left:4px solid #e8835a}
.quote-box .qt{font-size:15px;color:#7a5a5a;font-style:italic;line-height:1.6}

.month-stats{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.04);display:flex;justify-content:center;gap:36px}
.month-stats .stat-item{display:flex;flex-direction:column;align-items:center}
.month-stats .stat-item .num{font-size:20px;font-weight:700;color:#e8835a}
.month-stats .stat-item .label{font-size:12px;color:#b29595;margin-top:1px}

.add-area{display:flex;gap:10px}
.add-area input{flex:1;border:2px solid #e8ddd0;border-radius:14px;padding:12px 16px;font-size:15px;outline:none;background:#fff;color:#3d2c2c;transition:border-color .2s}
.add-area input:focus{border-color:#e8835a}
.add-area button{width:48px;height:48px;border-radius:14px;border:none;background:#e8835a;color:#fff;font-size:26px;font-weight:300;cursor:pointer;flex-shrink:0;transition:background .2s;display:flex;align-items:center;justify-content:center;line-height:1}
.add-area button:hover{background:#d9744e}

.empty-state{text-align:center;padding:50px 20px;color:#b29595}
.empty-state .icon{font-size:52px;margin-bottom:12px}
.empty-state p{font-size:15px}

.music-btn{position:fixed;bottom:24px;right:24px;z-index:20;width:48px;height:48px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .25s;padding:0;color:#b29595}
.music-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.music-btn.playing{color:#e8835a;box-shadow:0 3px 14px rgba(232,131,90,.2)}
.music-btn:active{transform:scale(.92)}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#3d2c2c;color:#fdf6ee;padding:10px 22px;border-radius:12px;font-size:14px;opacity:0;transition:all .35s ease;pointer-events:none;white-space:nowrap;z-index:10}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:420px){.container{padding:24px 16px 90px}.header h1{font-size:22px}.habit-card{padding:14px 16px}.check-btn{width:44px;height:44px;font-size:20px}.habit-emoji{font-size:30px;width:40px}.habit-info .name{font-size:15px}.month-stats{gap:24px}.cal-panel{padding:16px}}
</style>
</head>

<script>
(function(){
var SK='daily_habits_data';
function tk(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

var st=ld();

var QS='&#x575A;&#x6301;&#x4E0D;&#x662F;&#x4E00;&#x6B21;&#x8F70;&#x8F70;&#x70C8;&#x70C8;&#x7684;&#x884C;&#x52A8;&#xFF0C;&#x800C;&#x662F;&#x6BCF;&#x5929;&#x91CD;&#x590D;&#x7684;&#x5C0F;&#x4E8B;|&#x4ECA;&#x5929;&#x7684;&#x4F60;&#xFF0C;&#x6BD4;&#x6628;&#x5929;&#x591A;&#x4E86;&#x4E00;&#x70B9;&#x70B9;|&#x4E0D;&#x79EF;&#x8DEC;&#x6B65;&#xFF0C;&#x65E0;&#x4EE5;&#x81F3;&#x5343;&#x91CC;|&#x81EA;&#x5F8B;&#x5373;&#x81EA;&#x7531;|&#x5C0F;&#x5C0F;&#x575A;&#x6301;&#xFF0C;&#x5927;&#x5927;&#x6539;&#x53D8;|&#x751F;&#x547D;&#x5FC5;&#x987B;&#x6709;&#x88C2;&#x7F1D;&#xFF0C;&#x9633;&#x5149;&#x624D;&#x80FD;&#x7167;&#x8FDB;&#x6765;|&#x4E0D;&#x7ECF;&#x4E00;&#x756A;&#x5BD2;&#x5F7B;&#x9AA8;&#xFF0C;&#x600E;&#x5F97;&#x6885;&#x82B1;&#x6251;&#x9F3B;&#x9999;|&#x950F;&#x800C;&#x4E0D;&#x820D;&#xFF0C;&#x91D1;&#x77F3;&#x53EF;&#x94F8;|&#x4F60;&#x662F;&#x6700;&#x68D2;&#x7684;&#xFF01;|&#x79CD;&#x4E00;&#x68F5;&#x6811;&#x6700;&#x597D;&#x7684;&#x65F6;&#x95F4;&#x662F;&#x5341;&#x5E74;&#x524D;&#xFF0C;&#x5176;&#x6B21;&#x662F;&#x73B0;&#x5728;|&#x9053;&#x963B;&#x4E14;&#x957F;&#xFF0C;&#x884C;&#x5219;&#x5C06;&#x81F3;|&#x5B66;&#x5982;&#x9006;&#x6C34;&#x884C;&#x821F;&#xFF0C;&#x4E0D;&#x8FDB;&#x5219;&#x9000;|&#x4EBA;&#x751F;&#x5728;&#x52E4;&#xFF0C;&#x4E0D;&#x7D22;&#x4F55;&#x83B7;|&#x4F60;&#x6BD4;&#x4F60;&#x60F3;&#x8C61;&#x7684;&#x66F4;&#x5F3A;&#x5927;'.split('|');
function getQ(){return QS[Math.floor(Math.random()*QS.length)]}

function gs(n){var N=n.toLowerCase();for(var i=0;i<HS.length;i++){for(var j=0;j<HS[i].kw.length;j++){if(N.indexOf(HS[i].kw[j].toLowerCase())!==-1)return HS[i].e}}return'&#x2B50;'}

function render(){
var n=new Date();var h=n.getHours();var g='';
if(h<6)g='&#x1F319; &#x591C;&#x6DF1;&#x4E86;&#xFF0C;&#x65E9;&#x70B9;&#x4F11;&#x606F;&#xFF5E;';else if(h<9)g='&#x1F305; &#x65E9;&#x4E0A;&#x597D;&#xFF0C;&#x53C8;&#x662F;&#x65B0;&#x7684;&#x4E00;&#x5929;&#xFF01;';else if(h<12)g='&#x2600;&#xFE0F; &#x4E0A;&#x5348;&#x597D;';else if(h<14)g='&#x1F324;&#xFE0F; &#x4E2D;&#x5348;&#x597D;&#xFF0C;&#x8BB0;&#x5F97;&#x5403;&#x5348;&#x996D;&#xFF5E;';else if(h<18)g='&#x1F324;&#xFE0F; &#x4E0B;&#x5348;&#x597D;&#xFF0C;&#x7EE7;&#x7EED;&#x52A0;&#x6CB9;&#xFF01;';else if(h<21)g='&#x1F307; &#x508D;&#x665A;&#x597D;';else g='&#x1F319; &#x665A;&#x4E0A;&#x597D;&#xFF0C;&#x522B;&#x5FD8;&#x4E86;&#x6253;&#x5361;&#xFF5E;';
document.getElementById('greetingDisplay').textContent=g;
document.getElementById('dateDisplay').textContent=n.getFullYear()+'&#x5E74;'+(n.getMonth()+1)+'&#x6708;'+n.getDate()+'&#x65E5;  &#x661F;&#x671F;'+WD[n.getDay()];
document.getElementById('quoteDisplay').textContent=getQ();
var ts=tk(),habits=st.habits,dc=0;
for(var i=0;i<habits.length;i++){if(habits[i].history&&habits[i].history[ts])dc++}
var total=habits.length;
document.getElementById('doneCount').textContent=dc;
document.getElementById('totalCount').textContent=total;
var pct=total>0?Math.round(dc/total*100):0;
document.getElementById('progressFill').style.width=pct+'%';
var tmd=0,bsa=0,tca=0;
for(var i=0;i<habits.length;i++){tmd=Math.max(tmd,mcd(habits[i].history));bsa=Math.max(bsa,bh(habits[i].history));tca+=tcc(habits[i].history)}
document.getElementById('monthDays').textContent=tmd;document.getElementById('bestStreak').textContent=bsa;document.getElementById('totalChecked').textContent=tca;
var el=document.getElementById('habitList');
if(total===0){el.innerHTML='<div class="empty-state"><div class="icon">&#x2728;</div><p>&#x8FD8;&#x6CA1;&#x6709;&#x4E60;&#x60EF;&#xFF0C;&#x6DFB;&#x52A0;&#x4E00;&#x4E2A;&#x5F00;&#x59CB;&#x6253;&#x5361;&#x5427;</p></div>';return}
var hh='';
for(var i=0;i<habits.length;i++){var h=habits[i];var d=!!(h.history&&h.history[ts]);var s=ch(h.history||{});var b=bh(h.history||{});var en=h.emoji||'&#x2B50;';hh+='<div class="habit-card'+(d?' done':'')+'" data-id="'+h.id+'"><div class="habit-emoji">'+en+'</div><div class="habit-info"><div class="name">'+esc(h.name)+'</div><div class="streak">'+(s>0?'&#x1F525; &#x8FDE;&#x7EED; <span class="hl">'+s+'</span> &#x5929;':'&#x2615; &#x4ECA;&#x5929;&#x5F00;&#x59CB;&#x79EF;&#x7D2F;')+(b>1?' &#xB7; &#x6700;&#x9AD8; <span class="hl">'+b+'</span> &#x5929;':'')+'</div></div><button class="check-btn'+(d?' done':'')+'" data-action="toggle"><span>'+(d?'&#x2713;':'')+'</span></button></div>'}
el.innerHTML=hh;
if(calOpen)rc()
}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

var calOpen=false,calY,calM;
function rc(){
var y=calY,m=calM;document.getElementById('calMonthLabel').textContent=y+'&#x5E74;'+(m+1)+'&#x6708;';var cm=acd();var nh=st.habits.length;var fd=new Date(y,m,1).getDay();var dim=new Date(y,m+1,0).getDate();var ts=tk();var mc=0;for(var d=1;d<=dim;d++){var k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');if(cm[k])mc++}document.getElementById('calSummary').innerHTML='&#x672C;&#x6708;&#x6253;&#x5361; <span class="hl">'+mc+'</span> &#x5929;';var h='';for(var i=0;i<fd;i++)h+='<div class="cal-day other"></div>';for(var d=1;d<=dim;d++){var k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var ct=cm[k]||0;var it=k===ts;var cl='cal-day'+(it?' today':'');if(ct>0){h+='<div class="'+cl+'"><span class="num">'+d+'</span><span class="dot on"></span></div>'}else{h+='<div class="'+cl+'"><span class="num">'+d+'</span></div>'}}document.getElementById('calGrid').innerHTML=h}
function tc(){calOpen=!calOpen;document.getElementById('calPanel').classList.toggle('open',calOpen);if(calOpen){var n=new Date();calY=n.getFullYear();calM=n.getMonth();rc()}}

function toggle(id){var h=st.habits.find(function(x){return x.id===id});if(!h)return;var d=tk();if(!h.history)h.history={};if(h.history[d])delete h.history[d];else h.history[d]=true;sv();render()}
function del(id){st.habits=st.habits.filter(function(x){return x.id!==id});sv();render();toast('&#x5DF2;&#x5220;&#x9664;')}
function add(nm){nm=nm.trim();if(!nm)return;if(st.habits.some(function(h){return h.name===nm})){toast('&#x5DF2;&#x6709;&#x8FD9;&#x4E2A;&#x4E60;&#x60EF;');return}var mx=st.habits.reduce(function(m,h){return Math.max(m,h.id)},0);st.habits.push({id:mx+1,name:nm,emoji:gs(nm),history:{}});sv();render();document.getElementById('habitInput').value='';toast('&#x5DF2;&#x6DFB;&#x52A0;')}
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._timer);el._timer=setTimeout(function(){el.classList.remove('show')},1800)}

var mp=false;var ae=document.getElementById('bgAudio');ae.volume=0.3;var mb=document.getElementById('musicBtn');
mb.addEventListener('click',function(){if(mp){ae.pause();mp=false;mb.classList.remove('playing')}else{ae.play().then(function(){mp=true;mb.classList.add('playing')}).catch(function(){toast('&#x70B9;&#x51FB;&#x9875;&#x9762;&#x540E;&#x518D;&#x70B9;&#x64AD;&#x653E;')})}});

document.getElementById('calToggleBtn').addEventListener('click',tc);
document.getElementById('calPrev').addEventListener('click',function(){calM--;if(calM<0){calM=11;calY--}rc()});
document.getElementById('calNext').addEventListener('click',function(){var n=new Date();if(calY===n.getFullYear()&&calM===n.getMonth())return;calM++;if(calM>11){calM=0;calY++}rc()});
document.getElementById('habitList').addEventListener('click',function(e){var db=e.target.closest('[data-action="toggle"]');if(db){var c=db.closest('.habit-card');if(c)toggle(Number(c.dataset.id));return}var c=e.target.closest('.habit-card');if(c)toggle(Number(c.dataset.id))});
document.getElementById('addBtn').addEventListener('click',function(){add(document.getElementById('habitInput').value)});
document.getElementById('habitInput').addEventListener('keydown',function(e){if(e.key==='Enter'){add(e.target.value);e.target.value=''}});

render();
})();
</script>
</body>
</html>
